project:
  title: LeGrad-Inspired Temporal Explanations for Speech Emotion Recognition on IEMOCAP

paths:
  iemocap_root: data
  metadata_csv: data/metadata.csv
  results_dir: results
  predictions_csv: results/predictions.csv
  legrad_explanations_csv: results/legrad_explanations.csv
  speechxai_explanations_csv: results/speechxai_explanations.csv
  deletion_results_csv: results/deletion_results.csv

model:
  source: superb/wav2vec2-base-superb-er
  cache_dir: pretrained_models/wav2vec2-base-superb-er
  sample_rate: 16000

speechxai:
  repository_dir: third_party/SpeechXAI
  whisper_model: large-v2
  language: en
  batch_size: 2
  cpu_compute_type: int8
  cuda_compute_type: float16
  mask_padding_before_seconds: 0.10
  mask_padding_after_seconds: 0.04

evaluation:
  speechxai_top_k_values: [1, 2, 3, 5]
  random_trials: 20
  random_seed: 13
  legrad_bin_seconds: 0.05
